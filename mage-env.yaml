name: ubuntu2204-nfs
version: 2025072816
arch: x86_64
alias: ubuntu2204-x64-nfs
description: ubuntu 22.04 (jammy) for x86_64 - nfs
author: support-staff@lists.grid5000.fr
visibility: public
destructive: false
os: linux
image:
  file: /home/yuyang/mage-artifact/mage-image.tar.zst
  kind: tar
  compression: zstd
postinstalls:
- archive: server:///grid5000/postinstalls/g5k-postinstall.tgz
  compression: gzip
  script: g5k-postinstall --net netplan --fstab nfs --restrict-user current --disk-aliases
boot:
  kernel: "/boot/vmlinuz"
  initrd: "/boot/initrd.img"
  kernel_params: modprobe.blacklist=nouveau intel_iommu=on iommu=pt default_hugepagesz=1G hugepagesz=1G hugepages=128
filesystem: ext4
partition_type: 131
multipart: false
